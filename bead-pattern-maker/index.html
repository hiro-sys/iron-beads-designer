<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bead Pattern Maker - アイロンビーズ図案メーカー</title>
  </head>
  <body>
    <div id="app">
      <header class="app__header">
        <h1 class="app__title">Bead Pattern Maker</h1>
        <p class="app__subtitle">
          画像をアップロードすると、パーラービーズ／ナノビーズの図案を自動生成します。
        </p>
      </header>

      <div class="app__layout">
        <!-- ===== 設定サイドバー ===== -->
        <aside class="app__sidebar">
          <section class="panel">
            <h2 class="panel__title">1. 入力方法</h2>
            <div id="input-mode-toggle-container"></div>

            <!-- 画像モード: 画像アップロード＋背景色ピック用プレビュー -->
            <div id="image-input-group" class="input-group">
              <div id="image-upload-container"></div>
              <!-- 背景色の手動選択（クリック）用プレビュー。生ピクセル色の取得に使う -->
              <div class="preview-canvas__wrap">
                <canvas id="preview-canvas" class="preview-canvas" hidden></canvas>
              </div>
            </div>

            <!-- AIお題モード: APIキー・モデル・お題入力・生成ボタン -->
            <div id="ai-input-group" class="input-group" hidden>
              <div id="api-key-container"></div>
              <div id="ai-model-container"></div>
              <div id="ai-prompt-container"></div>
              <div class="ai-execution">
                <button id="ai-text-convert-btn" type="button" class="btn btn--primary" disabled>お題から生成</button>
                <div id="ai-processing-indicator" class="ai-processing-indicator" hidden>
                  <span class="ai-processing-indicator__spinner"></span>
                  <span class="ai-processing-indicator__text">AI生成中...</span>
                </div>
              </div>
            </div>
          </section>

          <section class="panel">
            <h2 class="panel__title">2. ビーズタイプ</h2>
            <div id="bead-type-container"></div>
          </section>

          <section class="panel">
            <h2 class="panel__title">3. プレート構成</h2>
            <div id="plate-config-container"></div>
            <div id="recommended-sizes-container"></div>
          </section>

          <section class="panel">
            <h2 class="panel__title">4. 画像の前処理</h2>
            <div id="preprocess-container"></div>
          </section>

          <section class="panel">
            <h2 class="panel__title">5. 使用する色</h2>
            <div id="palette-selector-container"></div>
          </section>

          <section class="panel">
            <h2 class="panel__title">6. 背景除外</h2>
            <div id="background-exclusion-container"></div>
          </section>

          <section class="panel">
            <h2 class="panel__title">7. 手動編集</h2>
            <div id="pattern-editor-tools-container"></div>
          </section>
        </aside>

        <!-- ===== 図案表示メイン ===== -->
        <main class="app__main">
          <div class="pattern-stage">
            <div class="pattern-controls">
              <div class="zoom-controls" role="group" aria-label="ズーム操作">
                <button id="zoom-out-btn" type="button" class="btn btn--icon" aria-label="縮小">
                  −
                </button>
                <span id="zoom-level" class="zoom-controls__level" aria-live="polite">100%</span>
                <button id="zoom-in-btn" type="button" class="btn btn--icon" aria-label="拡大">
                  ＋
                </button>
              </div>
              <button id="export-btn" type="button" class="btn btn--primary" disabled>
                PNGエクスポート
              </button>
            </div>

            <p id="pattern-message" class="pattern-message" role="status" aria-live="polite"></p>

            <div id="pattern-viewport" class="pattern-viewport">
              <p id="pattern-empty-message" class="pattern-empty">
                画像をアップロードして図案を生成してください。
              </p>
              <canvas id="pattern-canvas" class="pattern-canvas" hidden></canvas>
            </div>
          </div>

          <section class="panel panel--color-list">
            <h2 class="panel__title">使用色一覧</h2>
            <div id="color-list-container"></div>
          </section>
        </main>
      </div>

      <footer class="app__footer">
        <p>&copy; <span id="copyright-year">2026</span> hirosys All rights reserved.</p>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
